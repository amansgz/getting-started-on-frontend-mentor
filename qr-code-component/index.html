<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <!-- Title & Description(SEO) -->
    <title>Frontend Mentor | QR code component</title>
    <meta name="description" content="Solution to QR code component challenge from Frontend Mentor">

    <!-- CSS main stylesheets -->
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>

    <main class="main-content">

        <article class="card">
            <img class="card__image" src="./images/image-qr-code.png"
                alt="Scan this QR code to visit the Frontend Mentor website" width="288" height="288">

            <div class="card__content">
                <h1 class="card__title">
                    Improve your front-end skills by building projects
                </h1>

                <p class="card__description">
                    Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
                </p>
            </div>
        </article>

    </main>





    <footer class="footer">

        <ul class="attribution">
            <li class="attribution__item">
                Challenge by <a class="attribution__link" href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank" rel="noopener noreferrer">Frontend
                    Mentor</a>.
            </li>

            <li class="attribution__item">
                Coded by <a class="attribution__link" href=" https://github.com/amansgz" target="_blank"
                    rel="noopener noreferrer">@amansgz</a>
            </li>
        </ul>

    </footer>

</body>

</html>
