<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <!-- Title & Description (SEO) -->
    <title>Frontend Mentor | Social links profile</title>
    <meta name="description" content="Solution to Social links profile challenge on Frontend Mentor">

    <!-- CSS main stylesheets -->
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>

    <main class="main-content">

        <article class="profile" aria-labelledby="profile-name">

            <header class="profile__header">

                <div class="profile__info">
                    <img class="profile__avatar" src="./assets/images/avatar-jessica.jpeg"
                        alt="Avatar of Jessica Randall" width="88" height="88">

                    <h1 class="profile__name" id="profile-name">Jessica Randall</h1>

                    <p class="profile__location">London, United Kingdom</p>

                    <blockquote class="profile__bio">"Front-end developer and avid reader."</blockquote>
                </div>

            </header>

            <nav class="profile__social-nav" aria-label="Social links">

                <ul class="profile__social-list">
                    <li class="profile__social-item">
                        <a class="profile__social-link" href="#">GitHub</a>
                    </li>
                    <li class="profile__social-item">
                        <a class="profile__social-link" href="#">Frontend Mentor</a>
                    </li>
                    <li class="profile__social-item">
                        <a class="profile__social-link" href="#">LinkedIn</a>
                    </li>
                    <li class="profile__social-item">
                        <a class="profile__social-link" href="#">Twitter</a>
                    </li>
                    <li class="profile__social-item">
                        <a class="profile__social-link" href="#">Instagram</a>
                    </li>
                </ul>
            </nav>

        </article>

    </main>




    <footer class="footer">

        <ul class="attribution">
            <li class="attribution__item">
                Challenge by <a class="attribution__link" href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
            </li>

            <li class="attribution__item">
                Coded by
                <a class="attribution__link" href="https://github.com/amansgz" target="_blank"
                    rel="noopener noreferrer">
                    @amansgz</a>
            </li>
        </ul>

    </footer>

</body>

</html>
